<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable: safe zone is centre 80% (approx 204px circle) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Book — centred, scaled in to safe zone -->
  <rect x="128" y="112" width="256" height="288" rx="20" fill="white" opacity="0.92"/>
  <!-- Spine -->
  <rect x="128" y="112" width="26" height="288" rx="8" fill="#7c3aed" opacity="0.25"/>
  <!-- Text lines -->
  <rect x="170" y="176" width="136" height="16" rx="8" fill="#7c3aed" opacity="0.65"/>
  <rect x="170" y="206" width="110" height="12" rx="6" fill="#7c3aed" opacity="0.4"/>
  <rect x="170" y="230" width="126" height="12" rx="6" fill="#7c3aed" opacity="0.4"/>
  <rect x="170" y="254" width="100" height="12" rx="6" fill="#f59e0b" opacity="0.7"/>
  <rect x="170" y="278" width="116" height="12" rx="6" fill="#7c3aed" opacity="0.3"/>
  <!-- Badge -->
  <circle cx="320" cy="160" r="38" fill="#f59e0b"/>
  <text x="320" y="176" text-anchor="middle" font-size="44" font-family="system-ui,sans-serif" font-weight="bold" fill="white">V</text>
</svg>
