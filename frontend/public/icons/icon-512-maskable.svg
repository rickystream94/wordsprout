<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable: safe zone = centre 80% (r≤204). Disc r=196 stays safely inside. -->
  <!-- Full bleed background -->
  <rect width="512" height="512" fill="#0f172a"/>
  <!-- Amber disc -->
  <circle cx="256" cy="256" r="196" fill="#f59e0b"/>

  <!-- ── Primary dendrite branches ── -->
  <line x1="256" y1="256" x2="256" y2="127" stroke="#451a03" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="381" y2="194" stroke="#451a03" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="354" y2="365" stroke="#451a03" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="168" y2="365" stroke="#451a03" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="131" y2="194" stroke="#451a03" stroke-width="12" stroke-linecap="round"/>

  <!-- ── Secondary branches ── -->
  <!-- From top -->
  <line x1="256" y1="127" x2="215" y2="86"  stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="127" x2="297" y2="86"  stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <!-- From upper-right -->
  <line x1="381" y1="194" x2="416" y2="158" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <line x1="381" y1="194" x2="416" y2="222" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <!-- From lower-right -->
  <line x1="354" y1="365" x2="384" y2="396" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <line x1="354" y1="365" x2="334" y2="412" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <!-- From lower-left -->
  <line x1="168" y1="365" x2="138" y2="400" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <line x1="168" y1="365" x2="184" y2="412" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <!-- From upper-left -->
  <line x1="131" y1="194" x2="96"  y2="158" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>
  <line x1="131" y1="194" x2="96"  y2="222" stroke="#451a03" stroke-width="8" stroke-linecap="round"/>

  <!-- ── Synaptic terminal bulbs ── -->
  <circle cx="215" cy="86"  r="9" fill="#451a03"/>
  <circle cx="297" cy="86"  r="9" fill="#451a03"/>
  <circle cx="416" cy="158" r="9" fill="#451a03"/>
  <circle cx="416" cy="222" r="9" fill="#451a03"/>
  <circle cx="384" cy="396" r="9" fill="#451a03"/>
  <circle cx="334" cy="412" r="9" fill="#451a03"/>
  <circle cx="138" cy="400" r="9" fill="#451a03"/>
  <circle cx="184" cy="412" r="9" fill="#451a03"/>
  <circle cx="96"  cy="158" r="9" fill="#451a03"/>
  <circle cx="96"  cy="222" r="9" fill="#451a03"/>

  <!-- ── Soma (central neuron body) ── -->
  <circle cx="256" cy="256" r="64" fill="none" stroke="white" stroke-width="5"  opacity="0.10"/>
  <circle cx="256" cy="256" r="48" fill="none" stroke="white" stroke-width="7"  opacity="0.25"/>
  <circle cx="256" cy="256" r="27" fill="white"/>
  <circle cx="248" cy="248" r="9"  fill="white" opacity="0.55"/>
</svg>
