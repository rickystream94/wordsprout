<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0f172a"/>
  <!-- Amber disc -->
  <circle cx="96" cy="96" r="76" fill="#f59e0b"/>

  <!-- ── Primary dendrite branches ── -->
  <line x1="96" y1="96" x2="96"  y2="46"  stroke="#451a03" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="144" y2="72"  stroke="#451a03" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="134" y2="138" stroke="#451a03" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="62"  y2="138" stroke="#451a03" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="48"  y2="72"  stroke="#451a03" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ── Secondary branches ── -->
  <!-- From top -->
  <line x1="96"  y1="46"  x2="80"  y2="30"  stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <line x1="96"  y1="46"  x2="112" y2="30"  stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <!-- From upper-right -->
  <line x1="144" y1="72"  x2="158" y2="58"  stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <line x1="144" y1="72"  x2="158" y2="84"  stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <!-- From lower-right -->
  <line x1="134" y1="138" x2="146" y2="150" stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="138" x2="126" y2="156" stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <!-- From lower-left -->
  <line x1="62"  y1="138" x2="50"  y2="152" stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <line x1="62"  y1="138" x2="68"  y2="156" stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <!-- From upper-left -->
  <line x1="48"  y1="72"  x2="34"  y2="58"  stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
  <line x1="48"  y1="72"  x2="34"  y2="84"  stroke="#451a03" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Synaptic terminal bulbs ── -->
  <circle cx="80"  cy="30"  r="3.5" fill="#451a03"/>
  <circle cx="112" cy="30"  r="3.5" fill="#451a03"/>
  <circle cx="158" cy="58"  r="3.5" fill="#451a03"/>
  <circle cx="158" cy="84"  r="3.5" fill="#451a03"/>
  <circle cx="146" cy="150" r="3.5" fill="#451a03"/>
  <circle cx="126" cy="156" r="3.5" fill="#451a03"/>
  <circle cx="50"  cy="152" r="3.5" fill="#451a03"/>
  <circle cx="68"  cy="156" r="3.5" fill="#451a03"/>
  <circle cx="34"  cy="58"  r="3.5" fill="#451a03"/>
  <circle cx="34"  cy="84"  r="3.5" fill="#451a03"/>

  <!-- ── Soma (central neuron body) ── -->
  <circle cx="96" cy="96" r="24" fill="none" stroke="white" stroke-width="2"   opacity="0.10"/>
  <circle cx="96" cy="96" r="18" fill="none" stroke="white" stroke-width="2.5" opacity="0.25"/>
  <circle cx="96" cy="96" r="10" fill="white"/>
  <circle cx="93" cy="93" r="3.5" fill="white" opacity="0.55"/>
</svg>
