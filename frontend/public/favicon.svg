<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0f172a"/>
  <!-- Amber disc -->
  <circle cx="24" cy="24" r="19" fill="#f59e0b"/>
  <!-- Primary dendrite branches (5, evenly spaced at 72deg) -->
  <line x1="24" y1="24" x2="24" y2="11"  stroke="#451a03" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="20"  stroke="#451a03" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="32" y2="35"  stroke="#451a03" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="16" y2="35"  stroke="#451a03" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="12" y2="20"  stroke="#451a03" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Synaptic terminal bulbs -->
  <circle cx="24" cy="11" r="1.3" fill="#451a03"/>
  <circle cx="36" cy="20" r="1.3" fill="#451a03"/>
  <circle cx="32" cy="35" r="1.3" fill="#451a03"/>
  <circle cx="16" cy="35" r="1.3" fill="#451a03"/>
  <circle cx="12" cy="20" r="1.3" fill="#451a03"/>
  <!-- Soma -->
  <circle cx="24" cy="24" r="5.5" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <circle cx="24" cy="24" r="3"   fill="white"/>
  <circle cx="23" cy="23" r="1"   fill="white" opacity="0.55"/>
</svg>
