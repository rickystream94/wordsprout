title = "VocaBook Gitleaks Configuration"

[allowlist]
  description = "Allowed false-positives"
  # Allow test/example values in config templates
  paths = [
    ".gitleaks.toml",
    "*.example",
    "*.sample",
    "README.md",
  ]
  regexes = [
    # Azure Functions local settings template placeholder values
    "YOUR_.*_HERE",
    "<your-.*>",
    "placeholder",
    # MSAL / B2C documented example tenant IDs
    "00000000-0000-0000-0000-000000000000",
  ]

[[rules]]
  id = "azure-key"
  description = "Azure account key or connection string"
  regex = '''AccountKey=[A-Za-z0-9+/=]{88}'''
  tags = ["azure", "secret"]

[[rules]]
  id = "azure-sas"
  description = "Azure Shared Access Signature token"
  regex = '''sv=\d{4}-\d{2}-\d{2}&(s[a-z]=[^&]+&){2,}'''
  tags = ["azure", "secret"]

[[rules]]
  id = "generic-api-key"
  description = "Generic API key in environment variable"
  regex = '''(?i)(api[_\-]?key|apikey|secret[_\-]?key)\s*[:=]\s*["\']?[A-Za-z0-9\/+]{20,}["\']?'''
  tags = ["generic", "secret"]
