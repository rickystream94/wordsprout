name: Secret Scan

on:
  push:
    branches: [main, develop, '**']
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Detect secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  gitignore-check:
    name: Verify sensitive files are git-ignored
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check sensitive files are not tracked
        shell: bash
        run: |
          SENSITIVE_PATTERNS=(
            "local.settings.json"
            ".env"
            ".env.local"
            ".env.production"
            "*.pfx"
            "*.p12"
            "*.pem"
          )
          FAIL=0
          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            FOUND=$(git ls-files | grep -E "$pattern" || true)
            if [ -n "$FOUND" ]; then
              echo "ERROR: Sensitive file tracked in git: $FOUND"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            exit 1
          fi
          echo "All sensitive file patterns are excluded from git."
